services:
  spark:
    image: docker.io/bitnami/spark:latest
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
      - PIP_CACHE_DIR=/opt/bitnami/spark
      - HF_HOME=/opt/bitnami/spark/hf-cache
    volumes:
      - ./data:/data
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - '8080:8080'
      - '7077:7077'

  spark-worker-1:
    image: docker.io/bitnami/spark:latest
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
      - PIP_CACHE_DIR=/opt/bitnami/spark
      - HF_HOME=/opt/bitnami/spark/hf-cache
    volumes:
      - ./data:/data
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - '8081:8081'

  spark-worker-2:
    image: docker.io/bitnami/spark:latest
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
      - PIP_CACHE_DIR=/opt/bitnami/spark
      - HF_HOME=/opt/bitnami/spark/hf-cache
    volumes:
      - ./data:/data
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - '8082:8081'
    